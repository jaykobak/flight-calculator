<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight calculator</title>
    <!-- Link to bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="min-vh-100 d-flex justify-content-center align-items-center p-3"><div class="card text-center">
        <div class="card-body">
            <h2 class="card-title">Flight calculator</h2>
            <p class="card-text">Enter your account balance to found out cities you can go to in Nigeria.</p>

            <input type="number" placeholder="Account balance (₦)" id="accountBalance">
            <button class="btn btn-primary">Check</button>

            <div id="result" class="mt-3">Result will be shown here.</div>
        </div>
    </div>

    <!-- Link to custom JS -->
    <script src="script.js"></script>
    <!-- Link to bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
